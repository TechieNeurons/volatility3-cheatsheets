<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Volatility Cheat Sheet</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: #eee; margin: 0; overflow: hidden; }
        .node circle { fill: #00ffcc; stroke: #fff; stroke-width: 1.5px; cursor: pointer; }
        .node text { font: 13px sans-serif; fill: #ccc; pointer-events: none; }
        .link { fill: none; stroke: #444; stroke-width: 1.5px; }
        #info-box {
            position: fixed; top: 20px; right: 20px; width: 320px; 
            background: #262626; border: 1px solid #00ffcc; padding: 20px;
            display: none; border-radius: 8px; z-index: 100;
        }
        pre { background: #000; padding: 10px; color: #00ff00; font-size: 12px; border-radius: 4px; white-space: pre-wrap; }
        .close-btn { float: right; cursor: pointer; }
    </style>
</head>
<body>

    <div id="info-box">
        <span class="close-btn" onclick="document.getElementById('info-box').style.display='none'">✖</span>
        <h2 id="plugin-name" style="color:#00ffcc; margin-top:0;"></h2>
        <p id="plugin-desc"></p>
        <strong>Usage:</strong>
        <pre id="plugin-usage"></pre>
    </div>

    <svg id="tree-display"></svg>

    <script>
        const width = window.innerWidth;
        const height = window.innerHeight;

        const svg = d3.select("#tree-display")
            .attr("width", width)
            .attr("height", height)
            .call(d3.zoom().on("zoom", (event) => {
                svgGroup.attr("transform", event.transform);
            }))
            .append("g");

        const svgGroup = svg.append("g").attr("transform", "translate(100,0)");
        const treeLayout = d3.tree().nodeSize([40, 200]);

        // FETCH THE EXTERNAL JSON FILE
        d3.json("data.json").then(data => {
            let root = d3.hierarchy(data);
            root.x0 = height / 2;
            root.y0 = 0;

            // Collapse all except top level
            if (root.children) {
                root.children.forEach(collapse);
            }

            update(root);

            function collapse(d) {
                if (d.children) {
                    d._children = d.children;
                    d._children.forEach(collapse);
                    d.children = null;
                }
            }

            function update(source) {
                const nodes = treeLayout(root).descendants();
                const links = nodes.slice(1);

                const node = svgGroup.selectAll('g.node')
                    .data(nodes, d => d.data.name);

                const nodeEnter = node.enter().append('g')
                    .attr('class', 'node')
                    .attr("transform", d => `translate(${source.y0},${source.x0})`)
                    .on('click', (event, d) => {
                        // 1. Check if this is the root node (Volatility 3)
                        // We check if d.depth === 0 (the top level)
                        if (d.depth === 0) {
                            console.log("Root node clicked - ignoring to prevent collapse.");
                            return; // Exit here, do nothing
                        }

                        // 2. Original logic for everything else
                        if (d.children || d._children) {
                            d.children = d.children ? null : d._children;
                            update(d);
                        } else if (d.data.desc) {
                            showInfo(d.data);
                        }
                    });

                nodeEnter.append('circle').attr('r', 8);

                nodeEnter.append('text')
                    .attr("dy", ".35em")
                    .attr("x", d => d.children || d._children ? -15 : 15)
                    .attr("text-anchor", d => d.children || d._children ? "end" : "start")
                    .text(d => d.data.name);

                const nodeUpdate = nodeEnter.merge(node);
                nodeUpdate.transition().duration(500)
                    .attr("transform", d => `translate(${d.y},${d.x})`);

                nodeUpdate.select('circle')
                    .style("fill", d => {
                        if (d.depth === 0) return "#555"; // Make root dark/static looking
                            return d._children ? "#00ffcc" : "#666";
                        })
                    .style("cursor", d => d.depth === 0 ? "default" : "pointer");

                node.exit().transition().duration(500)
                    .attr("transform", d => `translate(${source.y},${source.x})`).remove();

                const link = svgGroup.selectAll('path.link').data(links, d => d.data.name);
                const linkEnter = link.enter().insert('path', "g")
                    .attr("class", "link")
                    .attr('d', d => {
                        const o = {x: source.x0, y: source.y0};
                        return diagonal(o, o);
                    });

                link.merge(linkEnter).transition().duration(500)
                    .attr('d', d => diagonal(d, d.parent));

                link.exit().remove();
                nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });
            }
        });

        function diagonal(s, d) {
            return `M ${s.y} ${s.x} C ${(s.y + d.y) / 2} ${s.x}, ${(s.y + d.y) / 2} ${d.x}, ${d.y} ${d.x}`;
        }

        function showInfo(data) {
            const box = document.getElementById('info-box');
            box.style.display = 'block';
            document.getElementById('plugin-name').innerText = data.name;
            document.getElementById('plugin-desc').innerText = data.desc;
            document.getElementById('plugin-usage').innerText = data.usage;
        }
    </script>
</body>
</html>

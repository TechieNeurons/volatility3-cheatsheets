<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volatility Cheat Sheet Tree</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: #eee; margin: 0; overflow: hidden; }
        .node circle { fill: #999; stroke: #fff; stroke-width: 1.5px; cursor: pointer; }
        .node text { font: 12px sans-serif; fill: #ccc; text-shadow: 0 1px 0 #000; }
        .link { fill: none; stroke: #555; stroke-width: 1.5px; }
        
        /* The Information Box (Modal) */
        #info-box {
            position: fixed; top: 20px; right: 20px; width: 300px; 
            background: #2d2d2d; border: 1px solid #444; padding: 15px;
            display: none; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #info-box h3 { margin-top: 0; color: #00ffcc; }
        pre { background: #000; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 11px; color: #00ff00; }
        .close-btn { float: right; cursor: pointer; color: #888; }
    </style>
</head>
<body>

    <div id="info-box">
        <span class="close-btn" onclick="document.getElementById('info-box').style.display='none'">✖</span>
        <h3 id="plugin-name">Plugin Name</h3>
        <p id="plugin-desc">Description goes here...</p>
        <strong>Usage:</strong>
        <pre id="plugin-usage"></pre>
    </div>

    <svg id="tree-container"></svg>

    <script>
        // YOUR DATA STRUCTURE
        const treeData = {
            "name": "Volatility 3",
            "children": [
                {
                    "name": "Windows",
                    "children": [
                        {
                            "name": "Process",
                            "children": [
                                { "name": "pslist", "desc": "Lists processes in a double-linked list.", "usage": "vol -f mem.raw windows.pslist" },
                                { "name": "psscan", "desc": "Pool scanner for process objects.", "usage": "vol -f mem.raw windows.psscan" }
                            ]
                        },
                        {
                            "name": "Malware",
                            "children": [
                                { "name": "malfind", "desc": "Finds injected code and shellcode.", "usage": "vol -f mem.raw windows.malfind" },
                                { "name": "ldrmodules", "desc": "Detects unlinked DLLs.", "usage": "vol -f mem.raw windows.ldrmodules" }
                            ]
                        }
                    ]
                },
                { "name": "Linux", "children": [] },
                { "name": "macOS", "children": [] }
            ]
        };

        const width = window.innerWidth;
        const height = window.innerHeight;
        const svg = d3.select("#tree-container")
            .attr("width", width)
            .attr("height", height)
            .append("g")
            .attr("transform", "translate(100,0)");

        const tree = d3.tree().size([height, width - 300]);
        let root = d3.hierarchy(treeData, d => d.children);
        root.x0 = height / 2;
        root.y0 = 0;

        // Collapse all children initially except the first level
        root.children.forEach(collapse);

        update(root);

        function collapse(d) {
            if (d.children) {
                d._children = d.children;
                d._children.forEach(collapse);
                d.children = null;
            }
        }

        function update(source) {
            const nodes = tree(root).descendants();
            const links = nodes.slice(1);

            nodes.forEach(d => d.y = d.depth * 180);

            const node = svg.selectAll('g.node')
                .data(nodes, d => d.data.name);

            const nodeEnter = node.enter().append('g')
                .attr('class', 'node')
                .attr("transform", d => `translate(${source.y0},${source.x0})`)
                .on('click', (event, d) => {
                    if (d.children || d._children) {
                        d.children = d.children ? null : d._children;
                        update(d);
                    } else if (d.data.desc) {
                        showInfo(d.data);
                    }
                });

            nodeEnter.append('circle').attr('r', 1e-6)
                .style("fill", d => d._children ? "lightsteelblue" : "#fff");

            nodeEnter.append('text')
                .attr("dy", ".35em")
                .attr("x", d => d.children || d._children ? -13 : 13)
                .attr("text-anchor", d => d.children || d._children ? "end" : "start")
                .text(d => d.data.name);

            const nodeUpdate = nodeEnter.merge(node);
            nodeUpdate.transition().duration(500)
                .attr("transform", d => `translate(${d.y},${d.x})`);

            nodeUpdate.select('circle').attr('r', 10)
                .style("fill", d => d._children ? "#00ffcc" : "#999");

            const nodeExit = node.exit().transition().duration(500)
                .attr("transform", d => `translate(${source.y},${source.x})`)
                .remove();

            const link = svg.selectAll('path.link').data(links, d => d.id);
            const linkEnter = link.enter().insert('path', "g")
                .attr("class", "link")
                .attr('d', d => {
                    const o = {x: source.x0, y: source.y0};
                    return diagonal(o, o);
                });

            link.merge(linkEnter).transition().duration(500)
                .attr('d', d => diagonal(d, d.parent));

            nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });
        }

        function diagonal(s, d) {
            return `M ${s.y} ${s.x} C ${(s.y + d.y) / 2} ${s.x}, ${(s.y + d.y) / 2} ${d.x}, ${d.y} ${d.x}`;
        }

        function showInfo(data) {
            document.getElementById('info-box').style.display = 'block';
            document.getElementById('plugin-name').innerText = data.name;
            document.getElementById('plugin-desc').innerText = data.desc;
            document.getElementById('plugin-usage').innerText = data.usage;
        }
    </script>
</body>
</html>

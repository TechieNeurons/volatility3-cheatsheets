<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Volatility 3 Cheat Sheet</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <!-- Search bar -->
    <div id="search-container">
        <button id="theme-toggle" title="Toggle Light/Dark Mode">🌓</button>

        <select id="os-selector">
            <option value="windows">windows</option>
            <option value="linux">linux</option>
            <option value="mac">mac</option>
        </select>

        <div style="position: relative;"> <input type="text" id="plugin-search" placeholder="Search plugin...">
            <div id="search-results"></div>
        </div>
    </div>

    <!-- Info box -->
    <div id="info-box" style="display: none;">
        <span class="close-btn" onclick="document.getElementById('info-box').style.display='none'">✖</span>
        <h2 id="plugin-name"></h2>
        <p id="plugin-desc"></p>
        <strong>Usage:</strong>
        <pre id="plugin-usage"></pre>
    </div>

    <!-- Display the tree -->
    <svg id="tree-display"></svg>

    <!-- All my logic for generating tree/searching-->
    <script src="script.js"></script>
</body>
</html>

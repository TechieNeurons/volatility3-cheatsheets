<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Volatility Cheat Sheet</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: #eee; margin: 0; overflow: hidden; }
        .node circle { fill: #ff0000; stroke: #fff; stroke-width: 2px; cursor: pointer; }
        .node text { font: 13px sans-serif; fill: #eee; pointer-events: none; text-shadow: 2px 2px 3px #000, -2px -2px 3px #000, 2px -2px 3px #000, -2px 2px 3px #000; }
        .link { fill: none; stroke: #444; stroke-width: 1.5px; }
        #info-box {
            position: fixed; top: 20px; right: 20px; width: auto; min-width: 300px; max-width: 600px;
            background: #1a1a1a; border: 2px solid #ff0000; padding: 20px;
            display: none; border-radius: 4px; z-index: 100; box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
            display: flex; flex-direction: column;
        }
        #plugin-name {
            color: #ff0000;         /* Red Plugin Name */
            margin-top: 0;
            font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
        }
        pre { background: #000; padding: 15px; color: #00ff41; font-family: 'Courier New', Courier, monospace; font-size: 12px; border-radius: 4px; margin-top: 10px; border: 1px solid #ff0000; white-space: pre; overflow-x: hidden; width: max-content; min-width: 100%; box-sizing: border-box;}
        .close-btn { float: right; cursor: pointer; color: #ff0000; font-weight: bold;}
    </style>
</head>
<body>

    <div id="info-box">
        <span class="close-btn" onclick="document.getElementById('info-box').style.display='none'">✖</span>
        <h2 id="plugin-name" style="color:#00ffcc; margin-top:0;"></h2>
        <p id="plugin-desc"></p>
        <strong>Usage:</strong>
        <pre id="plugin-usage"></pre>
    </div>

    <svg id="tree-display"></svg>

    <script>
        const width = window.innerWidth;
        const height = window.innerHeight;

        const svg = d3.select("#tree-display")
            .attr("width", width)
            .attr("height", height)
            .call(d3.zoom().on("zoom", (event) => {
                svgGroup.attr("transform", event.transform);
            }))
            .append("g");

        const svgGroup = svg.append("g").attr("transform", "translate(100,0)");
        const treeLayout = d3.tree().nodeSize([60, 300]);

        // FETCH THE EXTERNAL JSON FILE
        d3.json("data.json").then(data => {
            let root = d3.hierarchy(data);
            root.x0 = height / 2;
            root.y0 = 0;

            // Collapse all except top level
            if (root.children) {
                root.children.forEach(collapse);
            }

            update(root);

            function collapse(d) {
                if (d.children) {
                    d._children = d.children;
                    d._children.forEach(collapse);
                    d.children = null;
                }
            }

            function update(source) {
                const nodes = treeLayout(root).descendants();
                const links = nodes.slice(1);

                const node = svgGroup.selectAll('g.node')
                    .data(nodes, d => d.data.name);

                const nodeEnter = node.enter().append('g')
                    .attr('class', 'node')
                    .attr("transform", d => `translate(${source.y0},${source.x0})`)
                    .on('click', (event, d) => {
                        if (d.depth === 0) return; // can't click on root "volatility 3"

                        // activate the click on folder
                        if (d.children || d._children) {
                            d.children = d.children ? null : d._children;
                            update(d);
                        } else {
                            if (d.data.help || d.data.example) {
                                showInfo(d.data);
                            }
                        }
                    });

                nodeEnter.append('circle').attr('r', 8);

                nodeEnter.append('text')
                    .attr("dy", ".35em")
                    .attr("x", d => d.children || d._children ? -20 : 20)
                    .attr("text-anchor", d => d.children || d._children ? "end" : "start")
                    .text(d => d.data.name);

                const nodeUpdate = nodeEnter.merge(node);
                nodeUpdate.transition().duration(500)
                    .attr("transform", d => `translate(${d.y},${d.x})`);

                nodeUpdate.select('circle')
                    .attr('r', 8)
                    .style("fill", d => d._children ? "#ff0000" : "#800000") // Bright red if has children, dark red if leaf
                    .style("stroke", "#ffffff")
                    .style("stroke-width", "2px");

                node.exit().transition().duration(500)
                    .attr("transform", d => `translate(${source.y},${source.x})`).remove();

                const link = svgGroup.selectAll('path.link').data(links, d => d.data.name);
                const linkEnter = link.enter().insert('path', "g")
                    .attr("class", "link")
                    .attr('d', d => {
                        const o = {x: source.x0, y: source.y0};
                        return diagonal(o, o);
                    });

                link.merge(linkEnter).transition().duration(500)
                    .attr('d', d => diagonal(d, d.parent));

                link.exit().remove();
                nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });
            }
        });

        function diagonal(s, d) {
            return `M ${s.y} ${s.x} C ${(s.y + d.y) / 2} ${s.x}, ${(s.y + d.y) / 2} ${d.x}, ${d.y} ${d.x}`;
        }

        function showInfo(data) {
            const box = document.getElementById('info-box');
            box.style.display = 'block';
            document.getElementById('plugin-name').innerText = data.name;
            document.getElementById('plugin-desc').innerText = data.help || "No description available.";
            document.getElementById('plugin-usage').innerText = data.example || "No example available.";
        }
    </script>
</body>
</html>
